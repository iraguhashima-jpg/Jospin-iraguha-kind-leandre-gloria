<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Registration Form</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  }

  .card {
    background: #fff;
    width: 380px;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease-in-out;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(-20px);}
    to {opacity: 1; transform: translateY(0);}
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }

  label {
    font-size: 14px;
    color: #444;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: 0.3s;
  }

  input:focus, select:focus {
    border-color: #ff758c;
    box-shadow: 0 0 5px #ff758c;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #ff758c;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #ff4d6d;
  }

  #message {
    text-align: center;
    margin-top: 12px;
    font-weight: bold;
    color: green;
  }
</style>
</head>

<body>

<div class="card">
  <h2>Book Registration</h2>

  <form id="bookForm">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email" required>

    <label>Book Title</label>
    <input type="text" id="book" placeholder="Enter book title" required>

    <label>Category</label>
    <select id="category" required>
      <option value="">Choose Category</option>
      <option>Fiction</option>
      <option>Non-Fiction</option>
      <option>Education</option>
      <option>Technology</option>
    </select>

    <label>Borrow Duration</label>
    <select id="duration" required>
      <option value="">Select Duration</option>
      <option>1 Week</option>
      <option>2 Weeks</option>
      <option>1 Month</option>
    </select>

    <button type="submit">Register Book</button>
  </form>

  <div id="message"></div>
</div>

<script>
  document.getElementById("bookForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value;

    document.getElementById("message").innerText =
      "📚 Thank you " + name + "! Book registered successfully.";
  });
</script>

</body>
</html>
